<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | Sistema de Ventas</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        .contenedor {
            max-width: 500px;
            margin: 55px auto;
            background: white;
            padding: 32px;
            border-radius: 14px;
            box-shadow: 0 0 18px rgba(0,0,0,0.12);
        }

        h1 {
            text-align: center;
            color: #1f4e78;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 11px;
            margin-top: 6px;
            box-sizing: border-box;
            border: 1px solid #aaa;
            border-radius: 8px;
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 12px;
            background: #1f4e78;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #163957;
        }

        .error {
            background: #ffe0e0;
            color: #a00000;
            padding: 11px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .mensaje {
            background: #e0ffe4;
            color: #006b16;
            padding: 11px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        a {
            display: block;
            margin-top: 16px;
            text-align: center;
            color: #1f4e78;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="contenedor">
        <h1>Crear cuenta</h1>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if mensaje %}
            <div class="mensaje">{{ mensaje }}</div>
        {% endif %}

        <form method="POST">
            <label>Nombre</label>
            <input type="text" name="nombre" placeholder="Ej. Russell Vicens" required>

            <label>Correo</label>
            <input type="email" name="correo" placeholder="correo@gmail.com" required>

            <label>Contraseña</label>
            <input type="password" name="password" placeholder="Mínimo 6 caracteres" required>

            <label>Confirmar contraseña</label>
            <input type="password" name="confirmar" required>

            <button type="submit">Registrarme</button>
        </form>

        <a href="/login">Ya tengo cuenta</a>
        <a href="/">Volver al inicio</a>
    </div>
</body>
</html>
